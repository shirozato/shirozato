<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">shirozato profile banner</title>
  <desc id="desc">A futuristic system dashboard introducing shirozato, a backend and product developer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b16"/>
      <stop offset="0.55" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#11102b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7dd3fc"/>
      <stop offset="0.52" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop stop-color="#7dd3fc" stop-opacity=".28"/>
      <stop offset="1" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#64748b" stroke-opacity=".1"/>
    </pattern>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
    <clipPath id="frame"><rect x="1" y="1" width="1198" height="358" rx="24"/></clipPath>
  </defs>
  <style>
    .mono{font-family:'Cascadia Code','JetBrains Mono',Consolas,monospace}
    .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
    .pulse{animation:pulse 2.4s ease-in-out infinite}
    .scan{animation:scan 7s linear infinite}
    .orbit{transform-origin:1010px 180px;animation:spin 18s linear infinite}
    .orbit2{transform-origin:1010px 180px;animation:spin 12s linear infinite reverse}
    @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
    @keyframes scan{from{transform:translateY(-380px)}to{transform:translateY(380px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <g clip-path="url(#frame)">
    <rect width="1200" height="360" fill="url(#bg)"/>
    <rect width="1200" height="360" fill="url(#grid)"/>
    <circle cx="980" cy="150" r="270" fill="url(#glow)" filter="url(#blur)"/>
    <rect class="scan" x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity=".18"/>

    <g opacity=".85">
      <circle cx="1010" cy="180" r="104" fill="none" stroke="#7dd3fc" stroke-opacity=".24" stroke-dasharray="4 8"/>
      <circle cx="1010" cy="180" r="64" fill="none" stroke="#a78bfa" stroke-opacity=".35"/>
      <circle cx="1010" cy="180" r="27" fill="#101827" stroke="#7dd3fc" stroke-width="2"/>
      <path d="M997 180h26M1010 167v26" stroke="#7dd3fc" stroke-width="2" stroke-linecap="round"/>
      <g class="orbit"><circle cx="1114" cy="180" r="7" fill="#7dd3fc"/><circle cx="1114" cy="180" r="15" fill="#7dd3fc" opacity=".14"/></g>
      <g class="orbit2"><circle cx="1010" cy="116" r="6" fill="#c084fc"/><circle cx="1010" cy="116" r="14" fill="#c084fc" opacity=".16"/></g>
      <path d="M906 180H825M1074 180h72M1010 76V45M1010 284v31" stroke="#64748b" stroke-opacity=".35"/>
    </g>

    <g transform="translate(64 64)">
      <g class="mono" font-size="13">
        <circle cx="6" cy="-1" r="5" fill="#34d399" class="pulse"/>
        <text x="20" y="4" fill="#94a3b8" letter-spacing="2">SYSTEM ONLINE / KRASNOYARSK</text>
      </g>
      <text class="sans" x="0" y="86" fill="#f8fafc" font-size="64" font-weight="750" letter-spacing="-2">shirozato</text>
      <rect x="0" y="108" width="490" height="3" rx="2" fill="url(#accent)"/>
      <text class="mono" x="0" y="150" fill="#7dd3fc" font-size="18">backend systems · async flows · useful interfaces</text>
      <text class="mono" x="0" y="196" fill="#64748b" font-size="14">PYTHON / FASTAPI / POSTGRESQL / REACT / TYPESCRIPT</text>
      <g transform="translate(0 224)" class="mono" font-size="12">
        <rect width="145" height="34" rx="17" fill="#0f172a" stroke="#7dd3fc" stroke-opacity=".38"/>
        <text x="18" y="22" fill="#cbd5e1">$ build --useful</text>
        <path d="M165 17h74" stroke="#475569" stroke-dasharray="2 5"/>
        <circle cx="255" cy="17" r="4" fill="#a78bfa" class="pulse"/>
      </g>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="358" rx="24" fill="none" stroke="url(#accent)" stroke-opacity=".38" stroke-width="2"/>
</svg>

