<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="120" viewBox="0 0 1200 120" role="img" aria-labelledby="title">
  <title id="title">Keep shipping useful things</title>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7dd3fc" stop-opacity="0"/>
      <stop offset=".25" stop-color="#7dd3fc"/>
      <stop offset=".75" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    text{font-family:'Cascadia Code','JetBrains Mono',Consolas,monospace}
    .cursor{animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}
  </style>
  <path d="M80 34H1120" stroke="url(#line)" stroke-width="2"/>
  <text x="600" y="76" fill="#94a3b8" text-anchor="middle" font-size="15" letter-spacing="2">KEEP SHIPPING USEFUL THINGS <tspan class="cursor" fill="#7dd3fc">_</tspan></text>
</svg>
